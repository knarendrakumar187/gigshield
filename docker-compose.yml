services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield -d gigshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py seed_demo && python manage.py train_fraud_model && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: db
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://13.232.2.81,http://13.232.2.81:5173,http://13.232.2.81:80
      CORS_ALLOW_ALL_ORIGINS: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A gigshield worker -l info
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A gigshield beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "80:5173"
    environment:
      VITE_API_URL: ""

volumes:
  pgdata:
