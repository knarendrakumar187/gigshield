# GigShield Docker Configuration
version: '3.8'

services:
  # Backend (Django)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=0
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - DB_ENGINE=postgres
      - DB_NAME=gigshield
      - DB_USER=gigshield
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    networks:
      - gigshield-network

  # Frontend (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gigshield-network

  # Database Service
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=gigshield
      - POSTGRES_USER=gigshield
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gigshield-network

volumes:
  postgres_data:

networks:
  gigshield-network:
    driver: bridge
