services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigshield}
      POSTGRES_USER: ${POSTGRES_USER:-gigshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield_secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigshield}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn gigshield.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-gigshield}
      POSTGRES_USER: ${POSTGRES_USER:-gigshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield_secure_pass}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A gigshield worker -l info --max-tasks-per-child=100 --concurrency=2
    environment:
      DJANGO_DEBUG: "0"
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-gigshield}
      POSTGRES_USER: ${POSTGRES_USER:-gigshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield_secure_pass}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A gigshield beat -l info
    environment:
      DJANGO_DEBUG: "0"
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-gigshield}
      POSTGRES_USER: ${POSTGRES_USER:-gigshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield_secure_pass}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
